<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cnation-rummikub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #1e293b; color: white; user-select: none; }
        
        /* 루미큐브 타일 기본 스타일 */
        .rk-tile {
            width: 44px;
            height: 60px;
            background-color: #f8fafc;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), inset 0 -3px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        /* 선택된 타일 효과 */
        .rk-tile.selected {
            transform: translateY(-8px);
            border: 3px solid #facc15; /* 노란색 테두리 */
            box-shadow: 0 10px 15px -3px rgba(250, 204, 21, 0.4);
        }
        
        /* 색상 정의 */
        .color-black { color: #111827; }
        .color-red { color: #ef4444; }
        .color-blue { color: #3b82f6; }
        .color-orange { color: #f59e0b; }
        .color-joker { color: #ec4899; }

        .board-area { min-height: 35vh; background-color: #0f172a; border-radius: 12px; }
        .rack-area { min-height: 120px; background-color: #334155; border-radius: 12px; border: 4px solid #475569; }
        
        /* 보드 위의 조합 그룹 */
        .board-group {
            display: flex;
            gap: 4px;
            padding: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <div class="flex justify-between items-center mb-3 bg-slate-800 p-4 rounded-xl shadow-lg">
        <div>
            <h1 class="text-xl font-black text-indigo-400">cnation-rummikub</h1>
            <p class="text-xs text-slate-400 mt-1" id="deckCount">남은 덱: 106</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="timerDisplay" class="font-mono text-xl font-bold text-rose-400">
                ⏱ 30
            </div>
            <div class="bg-slate-700 px-3 py-1.5 rounded-lg text-center">
                <p class="text-[10px] text-slate-400 font-bold">컴퓨터</p>
                <p class="text-lg font-black text-white" id="comTileCount">14</p>
            </div>
        </div>
    </div>

    <div class="flex-1 board-area p-4 mb-3 flex flex-wrap content-start gap-3 overflow-y-auto" id="board">
        </div>

    <div class="mb-2 flex flex-wrap justify-between items-center gap-2">
        <div class="flex gap-2">
            <button onclick="sortRackByNum()" class="bg-slate-600 hover:bg-slate-500 px-3 py-1.5 rounded text-xs font-bold transition">
                <i class="fas fa-sort-numeric-down mr-1"></i>숫자순
            </button>
            <button onclick="sortRackByColor()" class="bg-slate-600 hover:bg-slate-500 px-3 py-1.5 rounded text-xs font-bold transition">
                <i class="fas fa-palette mr-1"></i>모양순
            </button>
        </div>
        <div class="flex gap-2">
            <button onclick="submitCombination()" id="playBtn" class="bg-yellow-500 hover:bg-yellow-600 text-slate-900 px-4 py-2 rounded-lg font-black shadow-lg transition">
                조합 내기!
            </button>
            <button onclick="drawTile()" id="drawBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold shadow-md transition">
                타일 먹기 (패스)
            </button>
        </div>
    </div>

    <div class="rack-area p-4 flex flex-wrap gap-2 items-center" id="playerRack">
        </div>

    <script>
        const COLORS = ['black', 'red', 'blue', 'orange'];
        let deck = [];
        let playerRack = [];
        let comRack = [];
        let boardGroups = []; // [ [tile1, tile2, tile3], [tile4, tile5] ] 형태의 2차원 배열

        // 선택 상태 관리
        let selectedRackIds = new Set();
        let selectedBoardIds = new Set();
        
        let isPlayerTurn = true;
        let timerInterval;
        let timeLeft = 30;

        // 1. 덱 생성
        function initDeck() {
            deck = [];
            for (let set = 0; set < 2; set++) {
                COLORS.forEach(color => {
                    for (let num = 1; num <= 13; num++) {
                        deck.push({ id: `t_${set}_${color}_${num}`, color: color, number: num, isJoker: false });
                    }
                });
            }
            deck.push({ id: `joker_1`, color: 'joker', number: '☻', isJoker: true });
            deck.push({ id: `joker_2`, color: 'joker', number: '☻', isJoker: true });
            
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        // 초기 분배
        function dealInitialTiles() {
            for(let i=0; i<14; i++) {
                playerRack.push(deck.pop());
                comRack.push(deck.pop());
            }
            sortRackByNum();
        }

        // 2. 정렬 기능
        window.sortRackByNum = () => {
            playerRack.sort((a, b) => a.number === b.number ? a.color.localeCompare(b.color) : a.number - b.number);
            renderAll();
        }

        window.sortRackByColor = () => {
            playerRack.sort((a, b) => a.color === b.color ? a.number - b.number : a.color.localeCompare(b.color));
            renderAll();
        }

        // 3. 타이머 로직
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            updateTimerUI();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("시간 초과! 타일을 하나 먹습니다.");
                    drawTile();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const timerEl = document.getElementById('timerDisplay');
            timerEl.innerText = `⏱ ${timeLeft}`;
            timerEl.className = `font-mono text-xl font-bold ${timeLeft <= 10 ? 'text-red-500 animate-bounce' : 'text-emerald-400'}`;
        }

        // 4. UI 렌더링
        function renderAll() {
            document.getElementById('deckCount').innerText = `남은 덱: ${deck.length}`;
            document.getElementById('comTileCount').innerText = comRack.length;
            
            // 내 받침대 렌더링
            const rackEl = document.getElementById('playerRack');
            rackEl.innerHTML = '';
            playerRack.forEach(tile => {
                const el = createTileEl(tile, selectedRackIds.has(tile.id));
                el.onclick = () => toggleRackTile(tile.id);
                rackEl.appendChild(el);
            });

            // 보드 렌더링
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardGroups.forEach((group, index) => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'board-group';
                group.forEach(tile => {
                    const el = createTileEl(tile, selectedBoardIds.has(tile.id));
                    el.onclick = () => toggleBoardTile(tile.id);
                    groupDiv.appendChild(el);
                });
                boardEl.appendChild(groupDiv);
            });
        }

        function createTileEl(tile, isSelected) {
            const el = document.createElement('div');
            el.className = `rk-tile color-${tile.color} ${isSelected ? 'selected' : ''}`;
            el.innerHTML = tile.number;
            return el;
        }

        // 선택 토글 함수
        function toggleRackTile(id) {
            if(!isPlayerTurn) return;
            selectedRackIds.has(id) ? selectedRackIds.delete(id) : selectedRackIds.add(id);
            renderAll();
        }
        function toggleBoardTile(id) {
            if(!isPlayerTurn) return;
            selectedBoardIds.has(id) ? selectedBoardIds.delete(id) : selectedBoardIds.add(id);
            renderAll();
        }

        // 5. 루미큐브 룰 검증 로직 (핵심 엔진)
        function isValidGroup(tiles) {
            if (tiles.length < 3) return false;
            
            let jokers = tiles.filter(t => t.isJoker).length;
            let regulars = tiles.filter(t => !t.isJoker);
            if (regulars.length === 0) return true;

            // 체크 1: 같은 숫자, 다른 색상 (최대 4개)
            let isSameNum = true;
            let firstNum = regulars[0].number;
            let colors = new Set();
            for (let t of regulars) {
                if (t.number !== firstNum || colors.has(t.color)) { isSameNum = false; break; }
                colors.add(t.color);
            }
            if (isSameNum && tiles.length <= 4) return true;

            // 체크 2: 같은 색상, 연속된 숫자
            let isConsecutive = true;
            let firstColor = regulars[0].color;
            let sortedRegs = [...regulars].sort((a,b) => a.number - b.number);
            let neededJokers = 0;

            for (let i = 0; i < sortedRegs.length; i++) {
                if (sortedRegs[i].color !== firstColor) { isConsecutive = false; break; }
                if (i > 0) {
                    let diff = sortedRegs[i].number - sortedRegs[i-1].number;
                    if (diff === 0) { isConsecutive = false; break; } // 중복 숫자 불가
                    neededJokers += (diff - 1); // 빈 공간만큼 조커 필요
                }
            }
            if (isConsecutive && neededJokers <= jokers) return true;

            return false;
        }

        // 6. 조합 제출하기 버튼 로직
        window.submitCombination = () => {
            if(!isPlayerTurn) return;

            let proposedTiles = [];
            let rackTilesToRemove = [];
            let boardTilesToRemoveByGroup = {};

            // 랙에서 선택된 타일 수집
            playerRack.forEach(t => {
                if(selectedRackIds.has(t.id)) {
                    proposedTiles.push(t);
                    rackTilesToRemove.push(t.id);
                }
            });

            // 보드에서 선택된 타일 수집
            boardGroups.forEach((group, gIndex) => {
                group.forEach(t => {
                    if(selectedBoardIds.has(t.id)) {
                        proposedTiles.push(t);
                        if(!boardTilesToRemoveByGroup[gIndex]) boardTilesToRemoveByGroup[gIndex] = [];
                        boardTilesToRemoveByGroup[gIndex].push(t.id);
                    }
                });
            });

            if(proposedTiles.length < 3) {
                alert("최소 3개 이상의 타일을 선택하여 조합해야 합니다.");
                return;
            }

            if(!isValidGroup(proposedTiles)) {
                alert("규칙에 맞지 않는 조합입니다. (같은색 연속숫자 or 다른색 같은숫자)");
                return;
            }

            // 바닥 타일을 빼왔다면, 남은 바닥 타일들도 3개 이상 정상 유지되는지 검사
            for (let gIndex in boardTilesToRemoveByGroup) {
                let remaining = boardGroups[gIndex].filter(t => !boardTilesToRemoveByGroup[gIndex].includes(t.id));
                if(remaining.length > 0 && !isValidGroup(remaining)) {
                    alert("바닥에서 타일을 가져올 경우, 남은 타일들도 정상적인 조합(3개 이상)이어야 합니다.");
                    return;
                }
            }

            // 모든 검증 통과 -> 데이터 적용!
            playerRack = playerRack.filter(t => !rackTilesToRemove.includes(t.id));

            let newBoardGroups = [];
            boardGroups.forEach((group, gIndex) => {
                if(boardTilesToRemoveByGroup[gIndex]) {
                    let remaining = group.filter(t => !boardTilesToRemoveByGroup[gIndex].includes(t.id));
                    if(remaining.length > 0) newBoardGroups.push(remaining); // 남은게 있으면 저장
                } else {
                    newBoardGroups.push(group);
                }
            });
            
            newBoardGroups.push(proposedTiles); // 새로 낸 조합 추가
            boardGroups = newBoardGroups;

            selectedRackIds.clear();
            selectedBoardIds.clear();
            
            // 턴 안 넘기고 계속 낼 수 있게 렌더링만 갱신 (턴 종료는 명시적으로)
            renderAll();
        }

        // 타일 먹고 턴 넘기기
        window.drawTile = () => {
            if (!isPlayerTurn || deck.length === 0) return;
            playerRack.push(deck.pop());
            endTurn();
        }

        function endTurn() {
            isPlayerTurn = false;
            clearInterval(timerInterval);
            document.getElementById('timerDisplay').innerText = "대기중";
            selectedRackIds.clear();
            selectedBoardIds.clear();
            renderAll();
            setTimeout(computerTurn, 1500); // 1.5초 후 컴퓨터 턴
        }

        // 7. 업그레이드된 컴퓨터 AI (자신의 덱에서만 조합을 찾음)
        function computerTurn() {
            let played = false;

            // 전략 1: 같은 숫자, 다른 색상 조합 찾기
            for (let n = 1; n <= 13; n++) {
                let sameNums = comRack.filter(t => t.number === n && !t.isJoker);
                let uniqueColors = new Set();
                let groupTiles = [];
                for (let t of sameNums) {
                    if (!uniqueColors.has(t.color)) {
                        uniqueColors.add(t.color);
                        groupTiles.push(t);
                    }
                }
                if (groupTiles.length >= 3) {
                    boardGroups.push(groupTiles);
                    comRack = comRack.filter(t => !groupTiles.includes(t));
                    played = true; break;
                }
            }

            // 전략 2: 같은 색상, 연속된 숫자 찾기
            if (!played) {
                for (let c of COLORS) {
                    if (played) break;
                    let colorTiles = comRack.filter(t => t.color === c && !t.isJoker).sort((a,b)=>a.number - b.number);
                    if (colorTiles.length >= 3) {
                        for (let i = 0; i <= colorTiles.length - 3; i++) {
                            if (colorTiles[i].number + 1 === colorTiles[i+1].number &&
                                colorTiles[i+1].number + 1 === colorTiles[i+2].number) {
                                let runTiles = [colorTiles[i], colorTiles[i+1], colorTiles[i+2]];
                                boardGroups.push(runTiles);
                                comRack = comRack.filter(t => !runTiles.includes(t));
                                played = true; break;
                            }
                        }
                    }
                }
            }

            // 조합 못 찾으면 타일 1개 먹기
            if (!played && deck.length > 0) comRack.push(deck.pop());

            // 턴 다시 플레이어로
            isPlayerTurn = true;
            renderAll();
            startTimer();
        }

        // 게임 시작!
        initDeck();
        dealInitialTiles();
        renderAll();
        startTimer();

    </script>
</body>
</html>
