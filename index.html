<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cnation-rummikub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #1e293b; 
            color: white; 
            user-select: none; 
            overflow: hidden; 
            touch-action: none; 
        }
        
        :root {
            --board-scale: 1; 
            --tile-w: 26px;
            --tile-h: 38px;
            --tile-fs: 17px;
        }

        .rk-tile {
            width: var(--tile-w);
            height: var(--tile-h);
            background-color: #f8fafc;
            border-radius: 5px;
            box-shadow: 0 3px 5px -1px rgba(0, 0, 0, 0.3), inset 0 -2px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: var(--tile-fs);
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s, border 0.1s, opacity 0.2s;
            border: 2px solid transparent;
            flex-shrink: 0;
            position: relative; 
        }
        
        .rk-tile.selected {
            transform: translateY(-5px);
            border: 2px solid #facc15;
            box-shadow: 0 6px 10px -2px rgba(250, 204, 21, 0.5);
        }

        #board .rk-tile {
            width: calc(var(--tile-w) * var(--board-scale));
            height: calc(var(--tile-h) * var(--board-scale));
            font-size: calc(var(--tile-fs) * var(--board-scale));
            border-radius: calc(5px * var(--board-scale));
        }
        
        @keyframes flyFromDeck {
            0% { transform: translate(100vw, -100vh) scale(0.2) rotate(180deg); opacity: 0; }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
        }
        .anim-draw {
            animation: flyFromDeck 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes flyToBoard {
            0% { transform: translateY(50vh) scale(1.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .anim-play {
            animation: flyToBoard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .color-black { color: #111827; }
        .color-red { color: #ef4444; }
        .color-blue { color: #3b82f6; }
        .color-orange { color: #f59e0b; }
        .color-joker { color: #ec4899; }

        .board-area { 
            background-color: #0f172a; 
            border-radius: 8px; 
            overflow: hidden; 
            align-content: flex-start;
        }
        
        .rack-area { 
            background-color: #334155; 
            border-radius: 8px; 
            border: 2px solid #475569; 
            min-height: 90px;
        }
        
        /* 💡 바닥 그룹 선택 효과 강화 */
        #board .board-group {
            display: flex;
            gap: calc(2px * var(--board-scale));
            padding: calc(4px * var(--board-scale));
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: calc(8px * var(--board-scale));
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }
        #board .board-group.selected {
            background-color: rgba(250, 204, 21, 0.2);
            border: 2px solid #facc15;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="h-[100dvh] flex flex-col p-2 gap-2 relative">

    <div id="startOverlay" class="absolute inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center backdrop-blur-sm transition-opacity duration-500">
        <h1 class="text-4xl font-black text-indigo-400 mb-2 text-center leading-tight">cnation<br>rummikub</h1>
        <p class="text-slate-400 mb-8 font-bold text-sm">모바일 웹 에디션</p>
        
        <div class="mb-8 w-full max-w-xs bg-slate-800 p-4 rounded-xl border border-slate-700">
            <label class="text-slate-400 font-bold text-xs mb-3 block text-center"><i class="fas fa-clock mr-1"></i> 턴 제한 시간 설정</label>
            <div class="flex flex-wrap justify-center gap-2">
                <button class="time-btn bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition" onclick="selectTime(10, this)">10초</button>
                <button class="time-btn bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition" onclick="selectTime(20, this)">20초</button>
                <button class="time-btn bg-yellow-500 text-slate-900 px-3 py-1.5 rounded-lg text-sm font-bold transition shadow-lg transform scale-105" onclick="selectTime(30, this)">30초</button>
                <button class="time-btn bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition" onclick="selectTime(60, this)">1분</button>
                <button class="time-btn bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition" onclick="selectTime(120, this)">2분</button>
                <button class="time-btn bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition" onclick="selectTime(300, this)">5분</button>
                <button class="time-btn bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition" onclick="selectTime(0, this)">무제한</button>
            </div>
        </div>

        <button onclick="startGame()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-4 rounded-2xl text-xl font-black shadow-[0_0_20px_rgba(99,102,241,0.4)] transform transition hover:scale-105 active:scale-95">
            게임 시작하기 🚀
        </button>
    </div>

    <div class="flex justify-between items-center bg-slate-800 p-2 rounded-lg shadow-md shrink-0">
        <div>
            <h1 class="text-base font-black text-indigo-400 leading-tight">cnation<br>rummikub</h1>
        </div>
        <div class="flex items-center gap-3">
            <div id="timerDisplay" class="font-mono text-base font-bold text-slate-500">대기</div>
            <div class="bg-slate-700 px-2 py-1 rounded-md text-center">
                <p class="text-[8px] text-slate-400 font-bold leading-none">컴퓨터</p>
                <p class="text-sm font-black text-white leading-tight" id="comTileCount">14</p>
            </div>
            <div class="bg-slate-700 px-2 py-1 rounded-md text-center">
                <p class="text-[8px] text-slate-400 font-bold leading-none">남은덱</p>
                <p class="text-sm font-black text-white leading-tight" id="deckCount">106</p>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center px-3 py-1.5 shrink-0 bg-slate-800 rounded-md border border-slate-700">
        <div id="turnStatusMessage" class="text-xs font-black text-slate-400 flex items-center gap-1">
            <i class="fas fa-play"></i> 대기중
        </div>
        <div id="initialMeldStatus" class="text-[10px] font-bold text-amber-400 animate-pulse">
            ⚠️ 최초 등록 (합계 30 이상 필요)
        </div>
    </div>

    <div class="flex-1 board-area p-2 flex flex-wrap gap-1.5" id="board"></div>

    <div class="flex justify-between items-center gap-1 shrink-0">
        <div class="flex gap-1">
            <button onclick="sortRackByNum()" class="bg-slate-600 hover:bg-slate-500 px-2 py-1.5 rounded text-[10px] font-bold transition">
                <i class="fas fa-sort-numeric-down mr-0.5"></i>숫자
            </button>
            <button onclick="sortRackByColor()" class="bg-slate-600 hover:bg-slate-500 px-2 py-1.5 rounded text-[10px] font-bold transition">
                <i class="fas fa-palette mr-0.5"></i>모양
            </button>
        </div>
        <div class="flex gap-1">
            <button onclick="submitCombination()" id="playBtn" class="bg-yellow-500 hover:bg-yellow-600 text-slate-900 px-4 py-1.5 rounded-md text-xs font-black shadow-md transition opacity-50 cursor-not-allowed" disabled>
                내기!
            </button>
            <button onclick="finishPlayerTurn()" id="endTurnBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-1.5 rounded-md text-xs font-bold shadow-md transition opacity-50 cursor-not-allowed" disabled>
                턴 종료
            </button>
        </div>
    </div>

    <div class="rack-area p-2 flex flex-wrap gap-1.5 items-center justify-center shrink-0" id="playerRack"></div>

    <script>
        const COLORS = ['black', 'red', 'blue', 'orange'];
        let deck = [];
        let playerRack = [], comRack = [];
        let boardGroups = []; 

        let selectedRackIds = new Set();
        let selectedBoardGroupIndices = new Set(); // 💡 바닥은 이제 '그룹 단위'로 선택됩니다.
        
        let isPlayerTurn = false; 
        let timerInterval, timeLeft = 30;
        let turnTimeLimit = 30; // 💡 선택한 턴 시간 (기본 30초, 0은 무제한)
        
        let isPlayerInitialMeldDone = false;
        let isComInitialMeldDone = false;
        let hasPlayedThisTurn = false;

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            let now = audioCtx.currentTime;
            
            if (type === 'select') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'submit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(900, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'start') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.2, now + 0.1); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // 💡 턴 시간 선택 로직
        window.selectTime = (seconds, btnEl) => {
            initAudio(); playSound('select');
            turnTimeLimit = seconds;
            document.querySelectorAll('.time-btn').forEach(b => {
                b.classList.remove('bg-yellow-500', 'text-slate-900', 'shadow-lg', 'transform', 'scale-105');
                b.classList.add('bg-slate-700', 'text-white');
            });
            btnEl.classList.remove('bg-slate-700', 'text-white');
            btnEl.classList.add('bg-yellow-500', 'text-slate-900', 'shadow-lg', 'transform', 'scale-105');
        }

        function initDeck() {
            deck = [];
            for (let set=0; set<2; set++) {
                COLORS.forEach(color => {
                    for (let num=1; num<=13; num++) deck.push({ id: `t_${set}_${color}_${num}`, color, number: num, isJoker: false });
                });
            }
            deck.push({ id: `joker_1`, color: 'joker', number: '☻', isJoker: true });
            deck.push({ id: `joker_2`, color: 'joker', number: '☻', isJoker: true });
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function dealInitialTiles() {
            for(let i=0; i<14; i++) { playerRack.push(deck.pop()); comRack.push(deck.pop()); }
            playerRack.sort((a,b) => a.number===b.number ? a.color.localeCompare(b.color) : a.number-b.number);
        }

        window.sortRackByNum = () => { if(!isPlayerTurn) return; initAudio(); playerRack.sort((a,b) => a.number===b.number ? a.color.localeCompare(b.color) : a.number-b.number); renderAll(); }
        window.sortRackByColor = () => { if(!isPlayerTurn) return; initAudio(); playerRack.sort((a,b) => a.color===b.color ? a.number-b.number : a.color.localeCompare(b.color)); renderAll(); }

        window.startGame = () => {
            initAudio(); playSound('start');
            document.getElementById('startOverlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('startOverlay').style.display = 'none'; }, 500);
            
            initDeck(); dealInitialTiles();
            startPlayerTurn();
        }

        function setButtonsState(enabled) {
            const playBtn = document.getElementById('playBtn');
            const endBtn = document.getElementById('endTurnBtn');
            if (enabled) {
                playBtn.disabled = false; playBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                endBtn.disabled = false; endBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                playBtn.disabled = true; playBtn.classList.add('opacity-50', 'cursor-not-allowed');
                endBtn.disabled = true; endBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function startPlayerTurn() {
            isPlayerTurn = true; hasPlayedThisTurn = false; setButtonsState(true);
            
            const turnMsg = document.getElementById('turnStatusMessage');
            turnMsg.innerHTML = '<i class="fas fa-user"></i> 사용자 차례입니다';
            turnMsg.className = 'text-xs font-black text-emerald-400 flex items-center gap-1';
            
            clearInterval(timerInterval);
            
            if (turnTimeLimit === 0) {
                document.getElementById('timerDisplay').innerText = `무제한`;
                document.getElementById('timerDisplay').className = `font-mono text-base font-bold text-emerald-400`;
            } else {
                timeLeft = turnTimeLimit;
                updateTimerUI();
                timerInterval = setInterval(() => {
                    timeLeft--; updateTimerUI();
                    if(timeLeft <= 0) { clearInterval(timerInterval); finishPlayerTurn(); }
                }, 1000);
            }
            renderAll();
        }

        function updateTimerUI() {
            if (turnTimeLimit === 0) return;
            const el = document.getElementById('timerDisplay');
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            let displayStr = m > 0 ? `${m}:${s.toString().padStart(2, '0')}` : s;
            el.innerText = `⏱ ${displayStr}`;
            el.className = `font-mono text-base font-bold ${timeLeft<=10 && m===0 ? 'text-red-500 animate-bounce' : 'text-emerald-400'}`;
        }

        function adjustBoardScale() {
            const board = document.getElementById('board');
            board.style.setProperty('--board-scale', '1');
            setTimeout(() => {
                let scale = 1.0; let safety = 20;
                while (board.scrollHeight > board.clientHeight && scale > 0.4 && safety > 0) {
                    scale -= 0.05;
                    board.style.setProperty('--board-scale', scale.toFixed(2));
                    safety--;
                }
            }, 50);
        }

        function renderAll() {
            document.getElementById('deckCount').innerText = deck.length;
            document.getElementById('comTileCount').innerText = comRack.length;
            
            const statusEl = document.getElementById('initialMeldStatus');
            if (isPlayerInitialMeldDone) {
                statusEl.innerText = "✅ 자유롭게 조합 가능"; statusEl.className = "text-[10px] font-bold text-emerald-400";
            } else {
                statusEl.innerText = "⚠️ 최초 등록 (합계 30 이상 필요)"; statusEl.className = "text-[10px] font-bold text-amber-400 animate-pulse";
            }
            
            const rackEl = document.getElementById('playerRack'); rackEl.innerHTML = '';
            playerRack.forEach(tile => {
                const el = createTileEl(tile, selectedRackIds.has(tile.id));
                el.onclick = () => toggleRackTile(tile.id);
                rackEl.appendChild(el);
            });

            const boardEl = document.getElementById('board'); boardEl.innerHTML = '';
            boardGroups.forEach((group, gIndex) => {
                const groupDiv = document.createElement('div'); 
                const isGroupSelected = selectedBoardGroupIndices.has(gIndex);
                // 💡 그룹 전체가 덩어리로 선택되는 효과
                groupDiv.className = `board-group ${isGroupSelected ? 'selected' : ''}`;
                groupDiv.onclick = () => toggleBoardGroup(gIndex);
                
                group.forEach(tile => {
                    const el = createTileEl(tile, isGroupSelected);
                    el.onclick = (e) => { e.stopPropagation(); toggleBoardGroup(gIndex); };
                    groupDiv.appendChild(el);
                });
                boardEl.appendChild(groupDiv);
            });

            adjustBoardScale();
        }

        function createTileEl(tile, isSelected) {
            const el = document.createElement('div');
            let animClass = '';
            if (tile.isNewDraw) { animClass = 'anim-draw'; tile.isNewDraw = false; }
            if (tile.isNewPlay) { animClass = 'anim-play'; tile.isNewPlay = false; }
            el.className = `rk-tile color-${tile.color} ${isSelected ? 'selected' : ''} ${animClass}`;
            el.innerHTML = tile.number;
            return el;
        }

        function toggleRackTile(id) {
            initAudio(); if(!isPlayerTurn) return;
            selectedRackIds.has(id) ? selectedRackIds.delete(id) : selectedRackIds.add(id);
            playSound('select'); renderAll();
        }
        
        // 💡 바닥은 타일 1개가 아닌 '그룹(덩어리)' 전체가 선택됨
        window.toggleBoardGroup = (gIndex) => {
            initAudio(); if(!isPlayerTurn) return;
            selectedBoardGroupIndices.has(gIndex) ? selectedBoardGroupIndices.delete(gIndex) : selectedBoardGroupIndices.add(gIndex);
            playSound('select'); renderAll();
        }

        function validateAndSortGroup(tiles) {
            if (tiles.length < 3) return false;
            let jokers = tiles.filter(t => t.isJoker);
            let regs = tiles.filter(t => !t.isJoker);
            if (regs.length === 0) return true;

            let isSameNum = new Set(regs.map(t => t.number)).size === 1;
            if (isSameNum) {
                let colors = new Set(regs.map(t => t.color));
                if (colors.size === regs.length && tiles.length <= 4) {
                    let num = regs[0].number;
                    tiles.forEach(t => t.currentValue = num);
                    tiles.sort((a,b) => {
                        if(a.isJoker) return 1; if(b.isJoker) return -1;
                        return a.color.localeCompare(b.color);
                    });
                    return tiles;
                }
            }

            let isConsecutive = true;
            let color = regs[0].color;
            if (regs.every(t => t.color === color)) {
                let sortedRegs = [...regs].sort((a,b) => a.number - b.number);
                let neededJokers = 0;
                for(let i=0; i<sortedRegs.length-1; i++) {
                    let diff = sortedRegs[i+1].number - sortedRegs[i].number - 1;
                    if (diff < 0) { isConsecutive = false; break; }
                    neededJokers += diff;
                }
                
                if (isConsecutive && neededJokers <= jokers.length) {
                    let result = [], jIdx = 0, currentNum = sortedRegs[0].number;
                    for (let i = 0; i < sortedRegs.length; i++) {
                        while (currentNum < sortedRegs[i].number) {
                            let j = jokers[jIdx++]; j.currentValue = currentNum++;
                            result.push(j);
                        }
                        sortedRegs[i].currentValue = sortedRegs[i].number;
                        result.push(sortedRegs[i]); currentNum++;
                    }
                    while (jIdx < jokers.length) {
                        let j = jokers[jIdx++]; j.currentValue = currentNum++;
                        result.push(j);
                    }
                    return result;
                }
            }
            return false;
        }

        // 💡 막강한 파티셔닝(그룹 분할 및 결합) 엔진
        function partitionIntoValidGroups(tiles) {
            if (tiles.length === 0) return [];
            let n = tiles.length;
            if (n > 20) { alert("한 번에 너무 많은 타일을 재배열할 수 없습니다."); return null; }

            let validSubsets = [];
            for(let i=1; i < (1<<n); i++) {
                let subset = [];
                for(let j=0; j<n; j++) { if (i & (1<<j)) subset.push(tiles[j]); }
                if (subset.length >= 3) {
                    let sorted = validateAndSortGroup([...subset]);
                    if (sorted) validSubsets.push(sorted);
                }
            }
            
            function search(remainingIds, currentPartition) {
                if (remainingIds.length === 0) return currentPartition;
                for (let subset of validSubsets) {
                    let canUse = true;
                    for (let t of subset) { if (!remainingIds.includes(t.id)) { canUse = false; break; } }
                    if (canUse) {
                        let nextRemaining = remainingIds.filter(id => !subset.find(t=>t.id===id));
                        let res = search(nextRemaining, [...currentPartition, subset]);
                        if (res) return res;
                    }
                }
                return null;
            }

            let finalPartition = search(tiles.map(t=>t.id), []);
            if (finalPartition) finalPartition.forEach(group => validateAndSortGroup(group));
            return finalPartition;
        }

        window.submitCombination = () => {
            initAudio(); if(!isPlayerTurn) return;

            let proposedTiles = [];
            let rackTilesToRemove = [];

            playerRack.forEach(t => { if(selectedRackIds.has(t.id)) { proposedTiles.push(t); rackTilesToRemove.push(t.id); } });
            
            // 선택된 바닥 그룹의 모든 타일을 재배열 후보(proposedTiles)로 흡수
            boardGroups.forEach((group, gIndex) => {
                if(selectedBoardGroupIndices.has(gIndex)) {
                    group.forEach(t => { proposedTiles.push(t); });
                }
            });

            if(proposedTiles.length === 0) return;

            // 💡 선택된 모든 타일들을 인공지능이 최적의 3개 이상 그룹들로 재분할
            let partitions = partitionIntoValidGroups(proposedTiles);
            if(!partitions) { playSound('error'); return; }

            if (!isPlayerInitialMeldDone) {
                if (selectedBoardGroupIndices.size > 0) { playSound('error'); alert("첫 등록 시에는 바닥에 있는 카드를 사용할 수 없습니다!"); return; }
                let sum = 0;
                partitions.forEach(g => sum += g.reduce((acc, t) => acc + t.currentValue, 0));
                if (sum < 30) { playSound('error'); alert(`첫 등록은 합계가 30 이상이어야 합니다. (현재: ${sum}점)`); return; }
                isPlayerInitialMeldDone = true;
            }

            playSound('submit');
            hasPlayedThisTurn = true; 
            playerRack = playerRack.filter(t => !rackTilesToRemove.includes(t.id));

            let newBoardGroups = [];
            boardGroups.forEach((group, gIndex) => {
                // 선택되지 않은 기존 바닥 그룹들은 그대로 유지
                if(!selectedBoardGroupIndices.has(gIndex)) {
                    newBoardGroups.push(group);
                }
            });
            
            partitions.forEach(g => {
                g.forEach(t => t.isNewPlay = true);
                newBoardGroups.push(g);
            });
            boardGroups = newBoardGroups;

            selectedRackIds.clear(); selectedBoardGroupIndices.clear();
            renderAll(); 
        }

        window.finishPlayerTurn = () => {
            initAudio(); 
            if (!isPlayerTurn) return;
            
            if (!hasPlayedThisTurn && deck.length > 0) {
                let drawnTile = deck.pop();
                drawnTile.isNewDraw = true; 
                playerRack.push(drawnTile);
                playSound('draw'); 
            }
            
            endTurn(); 
        }

        function endTurn() {
            isPlayerTurn = false; 
            setButtonsState(false);
            clearInterval(timerInterval);
            
            document.getElementById('timerDisplay').innerText = "대기";
            document.getElementById('timerDisplay').className = "font-mono text-base font-bold text-slate-500";
            
            const turnMsg = document.getElementById('turnStatusMessage');
            turnMsg.innerHTML = '<i class="fas fa-robot"></i> 컴퓨터가 생각중입니다...';
            turnMsg.className = 'text-xs font-black text-indigo-400 animate-pulse flex items-center gap-1';
            
            selectedRackIds.clear(); selectedBoardGroupIndices.clear(); renderAll();
            
            setTimeout(computerTurn, 1500); 
        }

        function getPossibleComGroups() {
            let foundGroups = []; let rack = [...comRack];
            for(let n=1; n<=13; n++) {
                let sames = rack.filter(t=>t.number===n && !t.isJoker);
                let colors = new Set(), group = [];
                for(let t of sames) { if(!colors.has(t.color)) { colors.add(t.color); group.push(t); } }
                if(group.length >= 3) { let sorted = validateAndSortGroup(group); if(sorted) { foundGroups.push(sorted); rack = rack.filter(t => !group.includes(t)); } }
            }
            for(let c of COLORS) {
                let colorTiles = rack.filter(t=>t.color===c && !t.isJoker).sort((a,b)=>a.number-b.number);
                if(colorTiles.length >= 3) {
                    let run = [colorTiles[0]];
                    for(let i=1; i<colorTiles.length; i++) {
                        if(colorTiles[i].number === colorTiles[i-1].number + 1) run.push(colorTiles[i]);
                        else if(colorTiles[i].number !== colorTiles[i-1].number) {
                            if(run.length >= 3) { let sorted = validateAndSortGroup(run); if(sorted) { foundGroups.push(sorted); rack = rack.filter(t=>!run.includes(t)); } }
                            run = [colorTiles[i]];
                        }
                    }
                    if(run.length >= 3) { let sorted = validateAndSortGroup(run); if(sorted) { foundGroups.push(sorted); rack = rack.filter(t=>!run.includes(t)); } }
                }
            }
            return foundGroups;
        }

        function computerTurn() {
            let possibleGroups = getPossibleComGroups();
            let played = false;
            
            if (!isComInitialMeldDone) {
                let totalSum = possibleGroups.reduce((acc, g) => acc + g.reduce((a,t)=>a+t.currentValue, 0), 0);
                if (totalSum >= 30 && possibleGroups.length > 0) {
                    possibleGroups.forEach(g => { 
                        g.forEach(t => t.isNewPlay = true); 
                        boardGroups.push(g); 
                        comRack = comRack.filter(t => !g.find(gt => gt.id === t.id)); 
                    });
                    isComInitialMeldDone = true; played = true;
                }
            } else {
                if (possibleGroups.length > 0) {
                    possibleGroups.forEach(g => { 
                        g.forEach(t => t.isNewPlay = true); 
                        boardGroups.push(g); 
                        comRack = comRack.filter(t => !g.find(gt => gt.id === t.id)); 
                    });
                    played = true;
                }
            }
            
            if (!played && deck.length > 0) { comRack.push(deck.pop()); }
            
            playSound('draw'); 
            startPlayerTurn();
        }

    </script>
</body>
